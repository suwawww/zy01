<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>紧急求助 - 倒计时</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style type="text/tailwindcss">
        @layer base {
            * {
                @apply border-border;
            }
            body {
                @apply bg-background text-foreground;
            }
        }
        @layer components {
            .container {
                @apply max-w-7xl mx-auto px-4 sm:px-6 lg:px-8;
            }
            .card {
                @apply bg-card rounded-xl border border-gray-200 p-6 shadow-md hover:shadow-lg transition-all duration-300 transform hover:translate-y-[-2px];
            }
            .btn {
                @apply inline-flex items-center justify-center rounded-md px-4 py-2 text-sm font-medium transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:opacity-50 disabled:pointer-events-none;
            }
            .btn-primary {
                @apply bg-primary text-white hover:bg-primary/90;
            }
            .btn-secondary {
                @apply bg-secondary text-secondary-foreground hover:bg-secondary/80;
            }
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: 'oklch(0.9828 0.0027 247.8517)',
                        foreground: 'oklch(0.3351 0.0027 247.8517)',
                        card: 'oklch(1.0000 0 0)',
                        primary: 'oklch(0.6871 0.2000 152.0219)',
                        secondary: 'oklch(0.9500 0 0)',
                        muted: 'oklch(0.9600 0 0)',
                        border: 'oklch(0.9200 0 0)',
                    },
                    fontFamily: {
                        sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
                    },
                },
            }
        }
    </script>
</head>
<body class="bg-red-500 min-h-screen flex flex-col items-center justify-center text-white">
    <!-- Main Content -->
    <div class="text-center p-8">
        <!-- Shield Icon -->
        <div class="w-32 h-32 rounded-full bg-white/20 flex items-center justify-center mx-auto mb-8">
            <span class="text-5xl">🛡️</span>
        </div>
        
        <!-- Countdown Number -->
        <div class="text-9xl font-bold mb-8" id="countdown">5</div>
        
        <!-- Title -->
        <h1 class="text-4xl font-bold mb-4">紧急求助模式</h1>
        
        <!-- Description -->
        <p class="text-xl mb-12">系统已自动定位您的位置，正在为您呼叫社区急救中心...</p>
        
        <!-- Call Button -->
        <button class="py-4 px-8 bg-white text-red-500 rounded-lg font-semibold hover:bg-white/90 transition-colors text-xl mb-8" onclick="window.location.href = 'emergency-page.html'">
            📞 立即通话
        </button>
        
        <!-- Cancel Button -->
        <button class="py-3 px-6 bg-white/30 backdrop-blur-sm border border-white/50 text-white rounded-lg font-semibold hover:bg-white/40 transition-colors text-lg" onclick="cancelEmergency()">
            取消求助
        </button>
    </div>
    
    <script>
        // Countdown function
        let countdown = 5;
        const countdownElement = document.getElementById('countdown');
        
        const timer = setInterval(function() {
            countdown--;
            countdownElement.textContent = countdown;
            
            if (countdown <= 0) {
                clearInterval(timer);
                // Redirect to emergency page
                window.location.href = 'emergency-page.html';
            }
        }, 1000);
        
        // Cancel emergency function
        function cancelEmergency() {
            clearInterval(timer);
            window.location.href = 'community-medical-service.html';
        }
    </script>
</body>
</html>
