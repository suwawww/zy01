<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录注册 - 社区紧急医疗服务</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style type="text/tailwindcss">
        @layer base {
            * {
                @apply border-border;
            }
            body {
                @apply bg-background text-foreground;
            }
        }
        @layer components {
            .container {
                @apply max-w-7xl mx-auto px-4 sm:px-6 lg:px-8;
            }
            .card {
                @apply bg-card rounded-xl border border-gray-200 p-6 shadow-md hover:shadow-lg transition-all duration-300 transform hover:translate-y-[-2px];
            }
            .btn {
                @apply inline-flex items-center justify-center rounded-md px-4 py-2 text-sm font-medium transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:opacity-50 disabled:pointer-events-none;
            }
            .btn-primary {
                @apply bg-primary text-white hover:bg-primary/90;
            }
            .btn-secondary {
                @apply bg-secondary text-secondary-foreground hover:bg-secondary/80;
            }
        }
        /* Custom Animation Styles */
        .transition-smooth {
            transition: all 1s ease-in-out;
        }
        .transform-origin-center {
            transform-origin: center;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: 'oklch(0.9828 0.0027 247.8517)',
                        foreground: 'oklch(0.3351 0.0027 247.8517)',
                        card: 'oklch(1.0000 0 0)',
                        primary: 'oklch(0.6871 0.2000 152.0219)',
                        secondary: 'oklch(0.9500 0 0)',
                        muted: 'oklch(0.9600 0 0)',
                        border: 'oklch(0.9200 0 0)',
                    },
                    fontFamily: {
                        sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
                    },
                },
            }
        }
    </script>
</head>
<body class="min-h-screen">
    <!-- Initial View -->
    <div id="initial-view" class="relative min-h-screen overflow-hidden">
        <!-- Background Image -->
        <div id="background-image" class="fixed inset-0 z-0 transition-smooth transform-origin-center">
            <img src="images/06.png" alt="背景" class="w-full h-full object-cover">
            <div class="absolute inset-0 bg-black/50"></div>
        </div>
        
        <!-- Main Content -->
        <div id="initial-content" class="relative z-10 min-h-screen flex flex-col transition-smooth">
            <!-- Header Title -->
            <div class="absolute top-8 left-8 z-10">
                <div class="space-y-8">
                    <h1 class="text-8xl font-bold text-white drop-shadow-lg tracking-tight">社区紧急医疗服务站</h1>
                    <h2 class="text-8xl font-bold text-white ml-20 drop-shadow-lg tracking-tight">为您的健康保驾护航</h2>
                </div>
            </div>
            
            <!-- Buttons -->
            <div class="flex flex-col items-end justify-end p-8 flex-1">
                <div class="flex flex-col gap-4 w-1/4">
                    <button class="py-8 px-6 bg-blue-500/40 backdrop-blur-lg border border-blue-400/50 text-white rounded-lg font-semibold hover:bg-blue-500/60 transition-colors text-center text-xl" onclick="showLoginForm()">
                        立即体验
                        <div class="text-sm text-white/80 mt-2">登录/注册</div>
                    </button>
                    <button class="py-8 px-6 bg-red-500/40 backdrop-blur-lg border border-red-400/50 text-white rounded-lg font-semibold hover:bg-red-500/60 transition-colors text-center text-xl" onclick="window.location.href='emergency-countdown.html'">
                        紧急呼救
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Login Form View -->
    <div id="login-form-view" class="fixed inset-0 z-10 opacity-0 pointer-events-none transition-smooth">
        <!-- Left Side - Background Image -->
        <div class="absolute left-0 top-0 w-1/2 h-full transition-smooth">
            <img src="images/06.png" alt="背景" class="w-full h-full object-cover">
            <div class="absolute inset-0 bg-black/50 flex flex-col justify-center p-12">
                <div class="space-y-6">
                    <h1 class="text-6xl font-bold text-white drop-shadow-lg tracking-tight">社区紧急医疗服务站</h1>
                    <h2 class="text-6xl font-bold text-white ml-16 drop-shadow-lg tracking-tight">为您的健康保驾护航</h2>
                </div>
            </div>
        </div>
        
        <!-- Right Side - Login Form -->
        <div class="absolute right-0 top-0 w-1/2 h-full bg-white flex flex-col items-center justify-center p-12 transition-smooth transform translate-x-full">
            <div class="w-full max-w-md">
                <!-- Logo -->
                <div class="flex justify-center mb-8">
                    <div class="w-20 h-20 rounded-full bg-primary/10 flex items-center justify-center">
                        <span class="text-3xl">🏥</span>
                    </div>
                </div>
                
                <!-- Tabs -->
                <div class="flex border-b mb-8">
                    <button id="login-tab" class="flex-1 py-4 text-center font-medium text-primary border-b-2 border-primary">登录</button>
                    <button id="register-tab" class="flex-1 py-4 text-center font-medium text-gray-500">注册</button>
                </div>
                
                <!-- Login Form -->
                <div id="login-form" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-2">请输入手机号</label>
                        <input type="tel" class="w-full px-4 py-3 border rounded-lg text-sm" placeholder="请输入手机号">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">验证码</label>
                        <div class="flex gap-2">
                            <input type="text" class="flex-1 px-4 py-3 border rounded-lg text-sm" placeholder="请输入验证码">
                            <button class="px-4 py-3 bg-gray-200 text-gray-700 rounded-lg font-medium hover:bg-gray-300 transition-colors">
                                获取
                            </button>
                        </div>
                    </div>
                    <div class="flex items-center">
                        <input type="checkbox" id="remember" class="mr-2">
                        <label for="remember" class="text-sm">记住我</label>
                    </div>
                    <button class="w-full py-3 bg-primary text-white rounded-lg font-semibold hover:bg-primary/90 transition-colors" onclick="window.location.href='./'">
                        登录
                    </button>
                </div>
                
                <!-- Register Form -->
                <div id="register-form" class="space-y-4 hidden">
                    <div>
                        <label class="block text-sm font-medium mb-2">请输入手机号</label>
                        <input type="tel" class="w-full px-4 py-3 border rounded-lg text-sm" placeholder="请输入手机号">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">验证码</label>
                        <div class="flex gap-2">
                            <input type="text" class="flex-1 px-4 py-3 border rounded-lg text-sm" placeholder="请输入验证码">
                            <button class="px-4 py-3 bg-gray-200 text-gray-700 rounded-lg font-medium hover:bg-gray-300 transition-colors">
                                获取
                            </button>
                        </div>
                    </div>
                    <div class="flex items-center">
                        <input type="checkbox" id="agree" class="mr-2">
                        <label for="agree" class="text-sm">已阅读并同意相关协议</label>
                    </div>
                    <button class="w-full py-3 bg-primary text-white rounded-lg font-semibold hover:bg-primary/90 transition-colors">
                        注册
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Show login form function
        function showLoginForm() {
            // Get elements
            const initialView = document.getElementById('initial-view');
            const backgroundImage = document.getElementById('background-image');
            const initialContent = document.getElementById('initial-content');
            const loginFormView = document.getElementById('login-form-view');
            const loginFormSide = loginFormView.querySelector('.absolute.right-0');
            
            // Start animation
            initialContent.style.opacity = '0';
            backgroundImage.style.transform = 'scale(1.2) translateX(-25%)';
            
            // Show login form view with fade-in effect
            loginFormView.style.opacity = '0';
            loginFormView.style.pointerEvents = 'auto';
            
            // Animate login form side with delay
            setTimeout(() => {
                loginFormSide.style.transform = 'translateX(0)';
            }, 300);
            
            // Fade in login form view
            let opacity = 0;
            const fadeInInterval = setInterval(() => {
                opacity += 0.05;
                loginFormView.style.opacity = opacity;
                if (opacity >= 1) {
                    clearInterval(fadeInInterval);
                    // Hide initial view after animation completes
                    setTimeout(() => {
                        initialView.style.display = 'none';
                    }, 300);
                }
            }, 30);
        }
        
        // Tab switching
        document.getElementById('login-tab').addEventListener('click', function() {
            document.getElementById('login-tab').classList.add('text-primary', 'border-primary');
            document.getElementById('login-tab').classList.remove('text-gray-500');
            document.getElementById('register-tab').classList.add('text-gray-500');
            document.getElementById('register-tab').classList.remove('text-primary', 'border-primary');
            document.getElementById('login-form').classList.remove('hidden');
            document.getElementById('register-form').classList.add('hidden');
        });
        
        document.getElementById('register-tab').addEventListener('click', function() {
            document.getElementById('register-tab').classList.add('text-primary', 'border-primary');
            document.getElementById('register-tab').classList.remove('text-gray-500');
            document.getElementById('login-tab').classList.add('text-gray-500');
            document.getElementById('login-tab').classList.remove('text-primary', 'border-primary');
            document.getElementById('register-form').classList.remove('hidden');
            document.getElementById('login-form').classList.add('hidden');
        });
    </script>
</body>
</html>
